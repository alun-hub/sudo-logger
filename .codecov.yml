coverage:
  status:
    project:
      default:
        target: 40%
        threshold: 2%
    patch:
      default:
        target: 50%
        threshold: 5%

flags:
  go:
    paths:
      - go/
  frontend:
    paths:
      - go/cmd/replay-server/ui/

comment:
  layout: "reach,diff,flags"
  behavior: default
  require_changes: false
