# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: sudo-logger

before:
  hooks:
    # In CI (release.yml), the plugin is already built by an earlier step in
    # a Rocky Linux 9 container for glibc compatibility (see that workflow's
    # "Build C plugin" step) — this is a no-op there since make sees the
    # .so is newer than plugin.c. Locally (e.g. `goreleaser build
    # --snapshot`), this does the real build against your host's glibc.
    # Don't insert a `make clean`/`git clean` between the CI step and this
    # one, or it'll rebuild against the runner's (too-new) glibc again.
    - make -C plugin
    - sh -c "cd go/cmd/replay-server/ui && npm ci && npm run build"

builds:
  - id: agent
    main: ./cmd/agent
    dir: go
    binary: sudo-logger-agent
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X sudo-logger/internal/version.Version={{.Version}}

  - id: server
    main: ./cmd/server
    dir: go
    # Must match the binary name the shipped systemd unit
    # (sudo-logserver.service) and INSTALLATION.md's architecture table
    # expect — "sudo-logger-server" is the package name, not the binary.
    binary: sudo-logserver
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X sudo-logger/internal/version.Version={{.Version}}

  - id: replay-server
    main: ./cmd/replay-server
    dir: go
    # Must match the binary name the shipped systemd unit (sudo-replay.service)
    # and INSTALLATION.md's architecture table expect — "sudo-logger-replay"
    # is the package name, not the binary.
    binary: sudo-replay-server
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X sudo-logger/internal/version.Version={{.Version}}

archives:
  - id: agent-archive
    ids:
      - agent
    formats: [tar.gz]
    name_template: "sudo-logger-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: agent.conf
        dst: agent.conf.default
      - src: sandbox.yaml
        dst: sandbox.yaml.default
      - src: sudo-logger-agent.service
        dst: sudo-logger-agent.service
      - src: sudo-logger-agent.preset
        dst: 50-sudo-logger-agent.preset
      - src: plugin/sudo_logger_plugin.so
        dst: sudo_logger_plugin.so
      - src: man/sudo-logger-agent.8
        dst: sudo-logger-agent.8
      - src: man/sudo_logger_plugin.8
        dst: sudo_logger_plugin.8
      - src: man/sandbox.yaml.5
        dst: sandbox.yaml.5
      - src: audit/99-immutable.rules
        dst: 99-immutable.rules
      - src: systemd-drop-ins/refuse-stop.conf
        dst: refuse-stop.conf

  - id: server-archive
    ids:
      - server
    formats: [tar.gz]
    name_template: "sudo-logger-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: server.conf
        dst: server.conf.default
      - src: sudo-logserver.service
        dst: sudo-logserver.service
      - src: sudo-logserver-restart.service
        dst: sudo-logserver-restart.service
      - src: sudo-logserver-restart.timer
        dst: sudo-logserver-restart.timer
      - src: sudo-logserver.logrotate
        dst: sudo-logserver.logrotate
      - src: man/sudo-logserver.8
        dst: sudo-logserver.8

  - id: replay-archive
    ids:
      - replay-server
    formats: [tar.gz]
    name_template: "sudo-logger-replay_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: go/cmd/replay-server/risk-rules.yaml
        dst: risk-rules.yaml.default
      - src: siem.yaml
        dst: siem.yaml.default
      - src: sudo-replay.service
        dst: sudo-replay.service
      - src: man/sudo-replay-server.8
        dst: sudo-replay-server.8

nfpms:
  - id: client-pkg
    package_name: sudo-logger-client
    ids:
      - agent
    formats:
      - deb
      - rpm
    homepage: https://github.com/alun-hub/sudo-logger
    maintainer: Alun Hub <alun@alun.se>
    description: Sudo I/O plugin and agent for remote session logging
    license: MIT
    dependencies:
      - systemd
    contents:
      - src: plugin/sudo_logger_plugin.so
        dst: /usr/libexec/sudo/sudo_logger_plugin.so
        file_info:
          mode: 0755
      - src: agent.conf
        dst: /etc/sudo-logger/agent.conf
        type: "config|noreplace"
        file_info:
          mode: 0640
      - src: sandbox.yaml
        dst: /etc/sudo-logger/sandbox.yaml
        type: "config|noreplace"
        file_info:
          mode: 0640
      - src: sudo-logger-agent.service
        dst: /usr/lib/systemd/system/sudo-logger-agent.service
        file_info:
          mode: 0644
      - src: sudo-logger-agent.preset
        dst: /usr/lib/systemd/system-preset/50-sudo-logger-agent.preset
        file_info:
          mode: 0644
      - src: audit/99-immutable.rules
        dst: /etc/audit/rules.d/99-immutable.rules
        type: "config|noreplace"
        file_info:
          mode: 0640
      - src: man/sudo-logger-agent.8
        dst: /usr/share/man/man8/sudo-logger-agent.8
        file_info:
          mode: 0644
      - src: man/sudo_logger_plugin.8
        dst: /usr/share/man/man8/sudo_logger_plugin.8
        file_info:
          mode: 0644
      - src: man/sandbox.yaml.5
        dst: /usr/share/man/man5/sandbox.yaml.5
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/sshd.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/sssd.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/rsyslog.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/polkit.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/chronyd.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/NetworkManager.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/firewalld.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/crond.service.d/refuse-stop.conf
        file_info:
          mode: 0644
      - src: systemd-drop-ins/refuse-stop.conf
        dst: /etc/systemd/system/gssproxy.service.d/refuse-stop.conf
        file_info:
          mode: 0644
    overrides:
      deb:
        dependencies:
          - sudo (>= 1.9)
        scripts:
          postinstall: scripts/deb-post-client.sh
          preremove: scripts/deb-preremove-client.sh
          postremove: scripts/deb-postremove-client.sh
      rpm:
        dependencies:
          - sudo >= 1.9
        scripts:
          preinstall: scripts/rpm-pre-client.sh
          postinstall: scripts/rpm-post-client.sh
          preremove: scripts/rpm-preun-client.sh
          postremove: scripts/rpm-postun-client.sh

  - id: server-pkg
    package_name: sudo-logger-server
    ids:
      - server
    formats:
      - deb
      - rpm
    homepage: https://github.com/alun-hub/sudo-logger
    maintainer: Alun Hub <alun@alun.se>
    description: Remote log server for sudo session recordings
    license: MIT
    dependencies:
      - systemd
      # postinstall generates the ack-sign.key/ack-verify.key keypair via
      # openssl; without this dependency the scriptlet fails silently
      # (all its openssl calls are 2>/dev/null) on a system that doesn't
      # already have openssl installed, and the service then crash-loops
      # with no signing key and no visible error anywhere.
      - openssl
    contents:
      # /var/log/sudoreplay is set as the sudologger user's home directory
      # (see rpm-pre-server.sh) but useradd without -m never creates it, so
      # it must be declared explicitly here — otherwise the systemd unit's
      # ReadWritePaths=/var/log/sudoreplay fails at startup with
      # "Failed to set up mount namespacing: No such file or directory"
      # on every fresh install.
      - dst: /var/log/sudoreplay
        type: dir
        file_info:
          owner: sudologger
          group: sudologger
          mode: 0750
      - src: server.conf
        dst: /etc/sudo-logger/server.conf
        type: "config|noreplace"
        file_info:
          mode: 0640
      - src: sudo-logserver.service
        dst: /usr/lib/systemd/system/sudo-logserver.service
        file_info:
          mode: 0644
      - src: sudo-logserver-restart.timer
        dst: /usr/lib/systemd/system/sudo-logserver-restart.timer
        file_info:
          mode: 0644
      - src: sudo-logserver-restart.service
        dst: /usr/lib/systemd/system/sudo-logserver-restart.service
        file_info:
          mode: 0644
      - src: sudo-logserver.logrotate
        dst: /etc/logrotate.d/sudo-logserver
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: man/sudo-logserver.8
        dst: /usr/share/man/man8/sudo-logserver.8
        file_info:
          mode: 0644
    overrides:
      rpm:
        scripts:
          preinstall: scripts/rpm-pre-server.sh
          postinstall: scripts/rpm-post-server.sh
          preremove: scripts/rpm-preun-server.sh
          postremove: scripts/rpm-postun-server.sh
      deb:
        scripts:
          preinstall: scripts/deb-pre-server.sh
          postinstall: scripts/deb-post-server.sh
          preremove: scripts/deb-preremove-server.sh
          postremove: scripts/deb-postremove-server.sh

  - id: replay-pkg
    package_name: sudo-logger-replay
    ids:
      - replay-server
    formats:
      - deb
      - rpm
    homepage: https://github.com/alun-hub/sudo-logger
    maintainer: Alun Hub <alun@alun.se>
    description: Web interface for replaying sudo session logs
    license: MIT
    dependencies:
      - systemd
      - acl
    contents:
      - src: go/cmd/replay-server/risk-rules.yaml
        dst: /etc/sudo-logger/risk-rules.yaml
        type: "config|noreplace"
        file_info:
          mode: 0664
      - src: siem.yaml
        dst: /etc/sudo-logger/siem.yaml
        type: "config|noreplace"
        file_info:
          mode: 0664
      - src: sudo-replay.service
        dst: /usr/lib/systemd/system/sudo-replay.service
        file_info:
          mode: 0644
      - src: man/sudo-replay-server.8
        dst: /usr/share/man/man8/sudo-replay-server.8
        file_info:
          mode: 0644
    overrides:
      rpm:
        scripts:
          preinstall: scripts/rpm-pre-replay.sh
          postinstall: scripts/rpm-post-replay.sh
          preremove: scripts/rpm-preun-replay.sh
          postremove: scripts/rpm-postun-replay.sh
      deb:
        scripts:
          preinstall: scripts/deb-pre-replay.sh
          postinstall: scripts/deb-post-replay.sh
          preremove: scripts/deb-preremove-replay.sh
          postremove: scripts/deb-postremove-replay.sh

signs:
  - id: cosign
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: all

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
