replicaCount: 1

image:
  repository: ghcr.io/alun-hub/sudo-logserver
  pullPolicy: IfNotPresent
  tag: "1.0"

storage:
  type: local
  local:
    size: 10Gi

tls:
  mode: self-signed
  existingSecret: ""
  provided:
    cert: ""
    key: ""
    ca: ""

postgresql:
  enabled: false

minio:
  enabled: false

replay:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/alun-hub/sudo-replay-server
    pullPolicy: IfNotPresent
    tag: "1.0"
  service:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: "sudo-logger.local"
  tls:
    enabled: false
    secretName: "sudo-logger-ingress-tls" # pragma: allowlist secret
