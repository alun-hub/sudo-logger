replicaCount: 1

image:
  repository: ghcr.io/alun-hub/sudo-logserver
  pullPolicy: IfNotPresent
  tag: "1.0"

storage:
  type: local # local | distributed
  local:
    size: 10Gi

tls:
  mode: self-signed # self-signed | provided | cert-manager
  existingSecret: ""
  provided:
    cert: ""
    key: ""
    ca: ""

postgresql:
  enabled: false

minio:
  enabled: false

replay:
  replicaCount: 1
  image:
    repository: ghcr.io/alun-hub/sudo-replay-server
    pullPolicy: IfNotPresent
    tag: "1.0"

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sudo-logger.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
