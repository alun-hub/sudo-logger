replicaCount: 1

image:
  repository: ghcr.io/alun-hub/sudo-logserver
  pullPolicy: IfNotPresent
  tag: "1.0"

storage:
  type: local # local | distributed
  local:
    size: 10Gi

tls:
  mode: self-signed # self-signed | provided | cert-manager
  existingSecret: ""
  provided:
    cert: ""
    key: ""
    ca: ""

postgresql:
  enabled: false

minio:
  enabled: false
