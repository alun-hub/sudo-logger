# Default values for sudo-logger.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of logserver replicas to run
replicaCount: 1

image:
  # -- Logserver image repository. Note: this is the same combined image as
  # replay.image.repository below (it contains both the sudo-logserver and
  # sudo-replay-server binaries) — only the command differs between the two.
  repository: ghcr.io/alun-hub/sudo-logger
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion if empty)
  tag: ""

storage:
  # -- Storage type: 'local' for single-node PVC, 'distributed' for PostgreSQL + S3/MinIO
  type: local
  local:
    # -- PVC size for local storage
    size: 10Gi
  distributed:
    # -- Fixed name of the Secret this chart generates (random db/S3 credentials,
    # persisted across `helm upgrade`) and also hands to the bundled postgresql/
    # minio subcharts via their own `auth.existingSecret`. Must be a literal
    # string (not templated) since it's referenced from values passed straight
    # to those subcharts.
    authSecretName: sudo-logger-distributed-auth  # pragma: allowlist secret
    s3:
      bucket: sudo-logs
      # -- S3-compatible endpoint. Empty = use the bundled MinIO subchart
      # (http://<release-name>-minio:9000).
      endpoint: ""
      pathStyle: true
    # -- PostgreSQL host/port. Empty host = use the bundled postgresql subchart
    # (<release-name>-postgresql).
    dbHost: ""
    dbPort: 5432

tls:
  # -- TLS mode: 'self-signed' (auto-generated CA+cert, persisted across
  # upgrades) or 'provided' (supply your own via tls.provided.*).
  # NOTE: a documented 'cert-manager' mode was previously listed here but was
  # never implemented — see charts/sudo-logger/README.md for status.
  mode: self-signed
  # -- Name of an existing Secret (keys: ca.crt, tls.crt, tls.key) to use
  # instead of the chart-managed one. Overrides `mode` entirely.
  existingSecret: ""
  provided:
    # -- PEM certificate (if mode is 'provided')
    cert: ""
    # -- PEM private key (if mode is 'provided')
    key: ""
    # -- PEM CA certificate (if mode is 'provided')
    ca: ""

signingKey:
  # -- Name of an existing Secret (key: ack-sign.key, PEM PKCS8 ed25519) to use
  # instead of the chart-managed, auto-generated one.
  existingSecret: ""

# -- Enable/disable bundled PostgreSQL chart (used when storage.type is 'distributed')
postgresql:
  enabled: false
  # Bitnami deprecated the free docker.io/bitnami/* images in 2025; the
  # version this subchart pins (16.4.0-debian-12-r14) is gone from Docker Hub.
  # bitnamilegacy is Bitnami's unmaintained mirror of pre-deprecation images —
  # override to your own mirror, or to docker.io/bitnami/* if you have a
  # Bitnami Secure Images subscription, once you have a longer-term source.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: sudologger
    database: sudologger
    # No password is assigned to the "postgres" superuser — only the
    # dedicated sudologger user/database above are used.
    enablePostgresUser: false
    existingSecret: sudo-logger-distributed-auth  # pragma: allowlist secret
    secretKeys:
      userPasswordKey: pg-password  # pragma: allowlist secret

# -- Enable/disable bundled MinIO chart (used when storage.type is 'distributed')
minio:
  enabled: false
  # See the note on postgresql.image above — same Bitnami deprecation applies.
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  defaultBuckets: sudo-logs
  auth:
    existingSecret: sudo-logger-distributed-auth  # pragma: allowlist secret
    rootUserSecretKey: root-user  # pragma: allowlist secret
    rootPasswordSecretKey: root-password  # pragma: allowlist secret

logserver:
  service:
    # -- Service type for the log server's agent-facing TLS port (9876).
    # ClusterIP is only reachable from inside the cluster — monitored hosts
    # outside it need NodePort (works everywhere) or LoadBalancer (needs a
    # cloud LB or MetalLB; k3s's built-in ServiceLB also works).
    type: NodePort
    # -- Fixed NodePort to use (only when type=NodePort). Empty = let
    # Kubernetes assign one (check with `kubectl get svc`).
    nodePort: ""

replay:
  # -- Number of replay-server replicas to run
  replicaCount: 1
  image:
    # -- Replay-server image repository (same combined image as image.repository above)
    repository: ghcr.io/alun-hub/sudo-logger
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion if empty)
    tag: ""

ingress:
  # -- Enable ingress for the replay-server
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Ingress hosts configuration
  hosts:
    - host: sudo-logger.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
