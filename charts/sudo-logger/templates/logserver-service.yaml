apiVersion: v1
kind: Service
metadata:
  name: {{ include "sudo-logger.fullname" . }}-logserver
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9876
      targetPort: 9876
      protocol: TCP
      name: tls
  selector:
    {{- include "sudo-logger.selectorLabels" . | nindent 4 }}
    app: logserver
