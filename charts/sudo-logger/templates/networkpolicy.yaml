# Defense-in-depth for the log server's admin/JIT-approval API (port 9877):
# restrict ingress to only the replay pod, within this namespace.
#
# This is best-effort, not a substitute for the TLS+CA-pinned client the
# admin API itself now requires (see -logserver-admin-ca/-tls-name in
# replay-deployment.yaml) -- NetworkPolicy is only enforced if your
# cluster's CNI implements it (Calico, Cilium, and all major cloud-managed
# CNIs do; K3s's default Flannel CNI does not, making this a harmless no-op
# there -- the TLS layer is what actually protects this endpoint everywhere).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sudo-logger.fullname" . }}-logserver-admin-restrict
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sudo-logger.selectorLabels" . | nindent 6 }}
      app: logserver
  policyTypes:
    - Ingress
  ingress:
    # Allow the main mTLS session port from anywhere (agents may be
    # off-cluster) -- only the admin port (9877) is restricted below.
    - ports:
        - protocol: TCP
          port: 9876
    - from:
        - podSelector:
            matchLabels:
              {{- include "sudo-logger.selectorLabels" . | nindent 14 }}
              app: replay
      ports:
        - protocol: TCP
          port: 9877
