{{- if and (eq .Values.storage.type "distributed") .Values.postgresql.enabled .Values.postgresql.tls.enabled }}
{{- $secretName := .Values.postgresql.tls.certificatesSecret }}
{{- /* Independent CA from tls.mode above — this is purely internal plumbing
       between the Go binaries and the bundled PostgreSQL, not something any
       agent needs to trust. Generated once, then reused across
       `helm upgrade` (rotating it would require restarting PostgreSQL with a
       new cert anyway, so there's no benefit to regenerating on every
       upgrade). */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
{{- if $existing }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
  ca.crt: {{ index $existing.data "ca.crt" }}
{{- else }}
{{- $altNames := list (printf "%s-postgresql" .Release.Name) (printf "%s-postgresql.%s.svc" .Release.Name .Release.Namespace) (printf "%s-postgresql.%s.svc.cluster.local" .Release.Name .Release.Namespace) }}
{{- $ca := genCA "sudo-logger-postgres-ca" 3650 }}
{{- $cert := genSignedCert (printf "%s-postgresql" .Release.Name) nil $altNames 3650 $ca }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
{{- end }}
{{- end }}
