apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sudo-logger.fullname" . }}-logserver
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.storage.type "local" }}
  replicas: 1
  {{- else }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sudo-logger.selectorLabels" . | nindent 6 }}
      app: logserver
  template:
    metadata:
      labels:
        {{- include "sudo-logger.selectorLabels" . | nindent 8 }}
        app: logserver
    spec:
      containers:
        - name: logserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: tls
              containerPort: 9876
              protocol: TCP
          volumeMounts:
            - name: logs
              mountPath: /var/log/sudo-logger
            {{- if eq .Values.tls.mode "provided" }}
            - name: tls
              mountPath: /etc/sudo-logger
              readOnly: true
            {{- end }}
      volumes:
        - name: logs
          {{- if eq .Values.storage.type "local" }}
          persistentVolumeClaim:
            claimName: {{ include "sudo-logger.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if eq .Values.tls.mode "provided" }}
        - name: tls
          secret:
            secretName: {{ include "sudo-logger.fullname" . }}-tls
        {{- end }}
