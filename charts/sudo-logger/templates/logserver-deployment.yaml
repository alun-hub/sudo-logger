apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sudo-logger.fullname" . }}-logserver
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.storage.type "local" }}
  replicas: 1
  strategy:
    # Recreate ensures the old pod releases the PVC before the new one starts.
    type: Recreate
  {{- else }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sudo-logger.selectorLabels" . | nindent 6 }}
      app: logserver
  template:
    metadata:
      labels:
        {{- include "sudo-logger.selectorLabels" . | nindent 8 }}
        app: logserver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # distroless nonroot UID
        runAsGroup: 65532
        fsGroup: 65532      # ensures PVC mount is writable by the process
      containers:
        - name: logserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -listen=:9876
            - -health-listen=:9877
            - -cert=/etc/sudo-logger/tls.crt
            - -key=/etc/sudo-logger/tls.key
            - -ca=/etc/sudo-logger/ca.crt
            - -signkey=/etc/sudo-logger/ack-sign.key
            - -approval-policy=/etc/sudo-logger-approval/approval-policy.yaml
            - -approval-token=$(APPROVAL_TOKEN)
            {{- if eq .Values.storage.type "local" }}
            - -logdir=/var/log/sudo-logger
            {{- else }}
            - -storage=distributed
            - -s3-bucket={{ .Values.storage.distributed.s3.bucket }}
            - -s3-endpoint={{ include "sudo-logger.s3Endpoint" . }}
            {{- if .Values.storage.distributed.s3.pathStyle }}
            - -s3-path-style
            {{- end }}
            - -s3-access-key=$(S3_ACCESS_KEY)
            - -s3-secret-key=$(S3_SECRET_KEY)
            - -db-url=$(DB_URL)
            - -buffer-dir=/var/lib/sudo-logger/buffer
            {{- end }}
          env:
            - name: APPROVAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sudo-logger.approvalTokenSecretName" . }}
                  key: token
            {{- if eq .Values.storage.type "distributed" }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.distributed.authSecretName }}
                  key: root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.distributed.authSecretName }}
                  key: root-password
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.distributed.authSecretName }}
                  key: db-url
            {{- end }}
          ports:
            - name: tls
              containerPort: 9876
              protocol: TCP
            - name: health
              containerPort: 9877
              protocol: TCP
          volumeMounts:
            - name: tls
              mountPath: /etc/sudo-logger/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: tls
              mountPath: /etc/sudo-logger/tls.crt
              subPath: tls.crt
              readOnly: true
            - name: tls
              mountPath: /etc/sudo-logger/tls.key
              subPath: tls.key
              readOnly: true
            - name: signing-key
              mountPath: /etc/sudo-logger/ack-sign.key
              subPath: ack-sign.key
              readOnly: true
            - name: approval-policy
              mountPath: /etc/sudo-logger-approval
              readOnly: true
            {{- if eq .Values.storage.type "local" }}
            - name: logs
              mountPath: /var/log/sudo-logger
            {{- else }}
            - name: buffer
              mountPath: /var/lib/sudo-logger/buffer
            {{- if .Values.postgresql.enabled }}
            - name: postgres-tls
              mountPath: /etc/sudo-logger/postgres-ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: {{ include "sudo-logger.tlsSecretName" . }}
        - name: signing-key
          secret:
            secretName: {{ include "sudo-logger.signingKeySecretName" . }}
        - name: approval-policy
          configMap:
            name: {{ include "sudo-logger.approvalPolicyConfigMapName" . }}
        {{- if eq .Values.storage.type "local" }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "sudo-logger.fullname" . }}-logs
        {{- else }}
        - name: buffer
          emptyDir: {}
        {{- if .Values.postgresql.enabled }}
        - name: postgres-tls
          secret:
            secretName: {{ .Values.postgresql.tls.certificatesSecret }}
        {{- end }}
        {{- end }}
        - name: tmp
          emptyDir: {}
