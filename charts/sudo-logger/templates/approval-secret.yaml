{{- if not .Values.approval.existingTokenSecret }}
{{- $secretName := printf "%s-approval-token" (include "sudo-logger.fullname" .) }}
{{- /* Generate once, then reuse across `helm upgrade` — rotating this would
       break the shared secret between logserver and replay until both pods
       cycle, briefly disabling the approvals API. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
{{- if $existing }}
  token: {{ index $existing.data "token" }}
{{- else }}
  token: {{ randAlphaNum 32 | b64enc }}
{{- end }}
{{- end }}
