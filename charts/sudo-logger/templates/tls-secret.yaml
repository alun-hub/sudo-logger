{{- if and (not .Values.tls.existingSecret) (ne .Values.tls.mode "cert-manager") }}
{{- /* cert-manager mode: templates/certificate.yaml requests a Certificate
       that populates this same Secret name instead — nothing to render here. */}}
{{- $secretName := printf "%s-tls" (include "sudo-logger.fullname" .) }}
{{- if eq .Values.tls.mode "provided" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  ca.crt: {{ required "tls.provided.ca is required when tls.mode=provided" .Values.tls.provided.ca | b64enc }}
  tls.crt: {{ required "tls.provided.cert is required when tls.mode=provided" .Values.tls.provided.cert | b64enc }}
  tls.key: {{ required "tls.provided.key is required when tls.mode=provided" .Values.tls.provided.key | b64enc }}
{{- else }}
{{- /* self-signed (default): generate once, then reuse across `helm upgrade` so
       already-issued client certs and distributed agents don't get invalidated. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
{{- if $existing }}
  ca.crt: {{ index $existing.data "ca.crt" }}
  ca.key: {{ index $existing.data "ca.key" }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
{{- else }}
{{- $altNames := list (printf "%s-logserver" (include "sudo-logger.fullname" .)) (printf "%s-logserver.%s.svc" (include "sudo-logger.fullname" .) .Release.Namespace) (printf "%s-logserver.%s.svc.cluster.local" (include "sudo-logger.fullname" .) .Release.Namespace) }}
{{- $ca := genCA (printf "%s-ca" (include "sudo-logger.fullname" .)) 3650 }}
{{- $cert := genSignedCert (include "sudo-logger.fullname" .) nil $altNames 3650 $ca }}
  ca.crt: {{ $ca.Cert | b64enc }}
  # Kept so you can mint additional client certs later for new monitored
  # hosts — see "Minting client certificates" in charts/sudo-logger/README.md.
  ca.key: {{ $ca.Key | b64enc }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
{{- end }}
