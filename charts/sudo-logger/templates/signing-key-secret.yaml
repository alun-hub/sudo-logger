{{- if not .Values.signingKey.existingSecret }}
{{- $secretName := printf "%s-signing-key" (include "sudo-logger.fullname" .) }}
{{- /* Generate once, then reuse across `helm upgrade` — rotating this key
       would invalidate ACK-signature verification on every existing agent. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
{{- if $existing }}
  ack-sign.key: {{ index $existing.data "ack-sign.key" }}
{{- else }}
  ack-sign.key: {{ genPrivateKey "ed25519" | b64enc }}
{{- end }}
{{- end }}
