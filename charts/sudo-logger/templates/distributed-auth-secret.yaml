{{- if eq .Values.storage.type "distributed" }}
{{- $secretName := .Values.storage.distributed.authSecretName }}
{{- $pgUser := .Values.postgresql.auth.username | default "sudologger" }}
{{- $pgDatabase := .Values.postgresql.auth.database | default "sudologger" }}
{{- $pgHost := include "sudo-logger.dbHost" . }}
{{- $pgPort := .Values.storage.distributed.dbPort | default 5432 }}
{{- /* Generate once, then reuse across `helm upgrade` — rotating these would
       break the already-running PostgreSQL/MinIO StatefulSets, which only
       pick up credentials on first init. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- /* TLS-verified connection to the bundled PostgreSQL (postgres-tls-secret.yaml
       provisions the CA it's verified against); external PostgreSQL (dbHost
       set, postgresql.enabled=false) has no chart-managed cert to verify, so
       falls back to sslmode=disable as before. */}}
{{- $sslParams := "sslmode=disable" }}
{{- if and .Values.postgresql.enabled .Values.postgresql.tls.enabled }}
{{- $sslParams = "sslmode=verify-full&sslrootcert=/etc/sudo-logger/postgres-ca.crt" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sudo-logger.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
{{- if $existing }}
  pg-password: {{ index $existing.data "pg-password" }}
  root-user: {{ index $existing.data "root-user" }}
  root-password: {{ index $existing.data "root-password" }}
  db-url: {{ index $existing.data "db-url" }}
{{- else }}
{{- $pgPassword := randAlphaNum 24 }}
{{- $rootPassword := randAlphaNum 24 }}
  pg-password: {{ $pgPassword | b64enc }}
  root-user: {{ "sudologger" | b64enc }}
  root-password: {{ $rootPassword | b64enc }}
  db-url: {{ printf "postgres://%s:%s@%s:%v/%s?%s" $pgUser $pgPassword $pgHost $pgPort $pgDatabase $sslParams | b64enc }}  # pragma: allowlist secret
{{- end }}
{{- end }}
