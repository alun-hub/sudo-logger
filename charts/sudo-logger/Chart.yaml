apiVersion: v2
name: sudo-logger
description: A Helm chart for sudo-logger audit server and replay UI
type: application
version: 0.3.0
appVersion: "1.35.0"
dependencies:
  - name: postgresql
    version: 15.5.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: minio
    version: 14.6.x
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
