name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        go: ["stable"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: go/cmd/replay-server/ui/package-lock.json

      - name: Build frontend
        working-directory: go/cmd/replay-server/ui
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.sum

      - name: Build and test C plugin
        run: make -C plugin test

      - name: Build
        working-directory: go
        run: go build ./...

      - name: Test
        working-directory: go
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go == 'stable'
        uses: codecov/codecov-action@v5
        with:
          files: go/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
