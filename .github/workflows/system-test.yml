name: System Test

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  system-test:
    name: Container-based end-to-end system test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      # TEMPORARY — diagnosing a PAM failure inside the test containers that
      # only reproduces on GitHub-hosted runners, not locally. Remove once
      # root-caused.
      - name: Diagnose PAM/sudo environment
        run: |
          echo "== host =="
          uname -a
          podman version
          podman info || true
          echo "== build test client image =="
          podman build -q -t sudo-client-test -f tests/Dockerfile.client .
          podman run -d --name diag --privileged --cap-add=NET_ADMIN --ulimit memlock=-1:-1 sudo-client-test
          sleep 3
          echo "== id / passwd / shadow =="
          podman exec diag id
          podman exec diag sh -c "cat /proc/self/uid_map; echo ---; cat /proc/self/gid_map"
          podman exec diag ls -la /etc/passwd /etc/shadow
          podman exec diag getent passwd root
          podman exec diag getent shadow root
          echo "== sudo -D9 verbose (expect this to reproduce the failure with full PAM trace) =="
          podman exec diag sh -c "sudo -D9 -v" || true
          podman rm -f diag || true

      - name: Run system test suite
        run: bash tests/run-system-test.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "== sudo-logserver-test logs =="
          podman logs sudo-logserver-test 2>&1 || true
          echo "== sudo-client-test logs =="
          podman logs sudo-client-test 2>&1 || true
