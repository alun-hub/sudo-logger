# sudo-logger shipper configuration
# All settings have built-in defaults; only override what you need.

# Address of the sudo-logserver instance (host:port).
server = logserver.example.com:9876

# TLS mutual authentication — paths to PEM files.
#cert          = /etc/sudo-logger/client.crt
#key           = /etc/sudo-logger/client.key
#ca            = /etc/sudo-logger/ca.crt
#verify_key    = /etc/sudo-logger/ack-verify.key

# Unix socket the sudo plugin connects to.
#socket        = /run/sudo-logger/plugin.sock

# Wayland screen capture via wayland-proxy.
# Set to false to disable recording of GUI sessions entirely.
#wayland       = true

# Path to the wayland-proxy helper binary.
#proxy_bin     = /usr/libexec/sudo-logger/wayland-proxy

# Screen capture interval in milliseconds.
# Decrease for smoother playback, increase for lower CPU/bandwidth.
#proxy_period  = 300

# Regular expressions for masking sensitive data in terminal output.
# Any match will be replaced with stars. Default patterns handle
# common API keys and password prompts.
#mask_pattern  = (?i)my-secret-prefix-[a-z0-9]{10}
#mask_pattern  = [0-9a-f]{32} # 32-char hex tokens

# How long to keep a session frozen when the log server is unreachable
# before abandoning it. Use Go duration syntax (e.g. 3m, 90s). Set to
# 0 to freeze indefinitely.
#freeze_timeout = 3m

# Terminate a session that has received no user input for this long.
# Useful for cleaning up sessions where the user has walked away.
# Use Go duration syntax (e.g. 30m, 2h). Set to 0 to disable (default).
#idle_timeout   = 0

# Optional disclaimer printed to the user's terminal when a sudo session starts.
# Leave commented out (or empty) to show no disclaimer.
# Use \n for newlines and \t for tab indentation within the text.
#disclaimer    = WARNING: This system is monitored.\nAll sudo sessions are recorded.
#
# Colour for the disclaimer text. Leave commented out for plain white.
# Supported values: red, green, blue, orange,
#                   bold_red, bold_green, bold_blue, bold_orange
#disclaimer_color = bold_orange

# Verbose debug logging to syslog/journal.
#debug         = false
