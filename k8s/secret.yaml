# Secret template — do NOT commit real values to git.
# Use create-secret.sh to generate this from your PKI files instead.
apiVersion: v1
kind: Secret
metadata:
  name: sudo-logger-tls
  namespace: sudo-logger
type: Opaque
data:
  # base64-encoded contents of your PKI files:
  #   base64 -w0 ca/ca.crt
  #   base64 -w0 server/server.crt
  #   base64 -w0 server/server.key
  #   base64 -w0 hmac.key          (ed25519 signing key for ACKs, passed via -signkey)
  ca.crt:     <base64>
  server.crt: <base64>
  server.key: <base64>
  hmac.key:   <base64>

# Distributed storage credentials — only needed when using --storage=distributed.
# Create via kubectl (never commit real values to git):
#
#   kubectl create secret generic sudo-logger-distributed \
#     --namespace sudo-logger \
#     --from-literal=db-url='postgres://user:pass@host:5432/dbname?sslmode=require' \
#     --from-literal=s3-access-key='<YOUR_ACCESS_KEY>' \
#     --from-literal=s3-secret-key='<YOUR_SECRET_KEY>'
#
# Alternatively, use an external secrets manager (Vault, ESO, Sealed Secrets)
# and reference the generated Secret by name in the deployment env vars.
