---
# MinIO — single-node, local k8s deployment
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sudo-logger
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: sudo-logger
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
          args:
            - server
            - /data
            - --console-address=:9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-secret-key
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
---
# Job to create the sudo-logs bucket after MinIO starts
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: sudo-logger
  annotations:
    # Re-run with: kubectl delete job minio-create-bucket -n sudo-logger
    description: "Creates the sudo-logs bucket in MinIO on first deploy"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/ready; do
                echo "Waiting for MinIO..."; sleep 5
              done
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-03T17-07-56Z
          env:
            - name: MC_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-access-key
            - name: MC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-secret-key
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 "$MC_ACCESS_KEY" "$MC_SECRET_KEY"
              mc mb --ignore-existing local/sudo-logs
              echo "Bucket sudo-logs ready."
