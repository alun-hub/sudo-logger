apiVersion: apps/v1
kind: Deployment
metadata:
  name: sudo-logserver
  namespace: sudo-logger
  labels:
    app: sudo-logserver
spec:
  # Local storage (default): keep at 1 replica — only one writer to the PVC.
  # Distributed storage (--storage=distributed): raise replicas freely;
  # no shared filesystem is needed. See README for distributed deployment.
  replicas: 1
  selector:
    matchLabels:
      app: sudo-logserver
  strategy:
    # Recreate ensures the old pod releases the PVC before the new one starts.
    # Switch to RollingUpdate when using distributed storage (no PVC).
    type: Recreate
  template:
    metadata:
      labels:
        app: sudo-logserver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # distroless nonroot UID
        runAsGroup: 65532
        fsGroup: 65532      # ensures PVC mount is writable by the process

      containers:
        - name: sudo-logserver
          image: ghcr.io/alun-hub/sudo-logserver:1.0
          args:
            - -listen=:9876
            - -logdir=/var/log/sudoreplay
            - -cert=/etc/sudo-logger/server.crt
            - -key=/etc/sudo-logger/server.key
            - -ca=/etc/sudo-logger/ca.crt
            - -signkey=/etc/sudo-logger/hmac.key
            - -blocked-users=/var/log/sudoreplay/blocked-users.yaml
            # --- Distributed storage (S3 + PostgreSQL) ---
            # Uncomment and fill in to switch to distributed mode.
            # Remove the -logdir and -blocked-users flags above; those are
            # local-storage-only. Replace the PVC volume with an emptyDir.
            # - -storage=distributed
            # - -s3-bucket=sudo-logs
            # - -s3-endpoint=https://minio.internal:9000   # omit for AWS
            # - -s3-path-style                              # MinIO / StorageGRID
            # - -s3-access-key=$(S3_ACCESS_KEY)            # from Secret env var
            # - -s3-secret-key=$(S3_SECRET_KEY)
            # - -db-url=$(DB_URL)
            # - -buffer-dir=/var/lib/sudo-logger/buffer

          ports:
            - name: tls
              containerPort: 9876
              protocol: TCP

          volumeMounts:
            - name: tls-certs
              mountPath: /etc/sudo-logger
              readOnly: true
            - name: logs
              mountPath: /var/log/sudoreplay

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          livenessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: tls-certs
          secret:
            secretName: sudo-logger-tls
            defaultMode: 0400   # private key readable only by process
        - name: logs
          persistentVolumeClaim:
            claimName: sudoreplay-logs
        # For distributed storage: replace the PVC above with an emptyDir.
        # The emptyDir only holds in-flight S3 uploads; no persistent storage needed.
        # - name: buffer
        #   emptyDir: {}
