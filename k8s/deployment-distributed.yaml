apiVersion: apps/v1
kind: Deployment
metadata:
  name: sudo-logserver
  namespace: sudo-logger
  labels:
    app: sudo-logserver
spec:
  # Distributed storage: freely scale replicas — no shared PVC needed.
  replicas: 1
  selector:
    matchLabels:
      app: sudo-logserver
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sudo-logserver
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532

      containers:
        - name: sudo-logserver
          image: localhost/sudo-logger:latest
          imagePullPolicy: Never
          args:
            - -listen=:9876
            - -health-listen=:9877
            - -cert=/etc/sudo-logger/server.crt
            - -key=/etc/sudo-logger/server.key
            - -ca=/etc/sudo-logger/ca.crt
            - -signkey=/etc/sudo-logger/ack-sign.key
            - -storage=distributed
            - -s3-bucket=sudo-logs
            - -s3-endpoint=http://minio:9000
            - -s3-path-style
            - -s3-access-key=$(S3_ACCESS_KEY)
            - -s3-secret-key=$(S3_SECRET_KEY)
            - -db-url=$(DB_URL)
            - -buffer-dir=/var/lib/sudo-logger/buffer

          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-secret-key
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: db-url

          ports:
            - name: tls
              containerPort: 9876
              protocol: TCP
            - name: health
              containerPort: 9877
              protocol: TCP

          volumeMounts:
            - name: tls-certs
              mountPath: /etc/sudo-logger
              readOnly: true
            - name: buffer
              mountPath: /var/lib/sudo-logger/buffer

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /healthz
              port: 9877
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 9877
            initialDelaySeconds: 3
            periodSeconds: 5


      volumes:
        - name: tls-certs
          secret:
            secretName: sudo-logger-tls  # pragma: allowlist secret
            defaultMode: 0400
        - name: buffer
          emptyDir: {}
