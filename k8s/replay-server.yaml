---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sudo-replay-server
  namespace: sudo-logger
  labels:
    app: sudo-replay-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sudo-replay-server
  template:
    metadata:
      labels:
        app: sudo-replay-server
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532

      containers:
        - name: sudo-replay-server
          image: localhost/sudo-logger:latest
          imagePullPolicy: Never
          command: [/usr/local/bin/sudo-replay-server]
          args:
            - -listen=:8080
            - -storage=distributed
            - -s3-bucket=sudo-logs
            - -s3-endpoint=http://minio:9000
            - -s3-path-style
            - -s3-access-key=$(S3_ACCESS_KEY)
            - -s3-secret-key=$(S3_SECRET_KEY)
            - -db-url=$(DB_URL)
            - -buffer-dir=/var/lib/sudo-logger/buffer
            - -logserver-admin=https://sudo-logserver-admin:9877
            - -logserver-admin-token=$(APPROVAL_TOKEN)
            - -logserver-admin-ca=/etc/sudo-logger/admin-ca.crt
            # Must match the SAN on the log server's TLS certificate (the
            # same hostname used as SERVER_HOSTNAME when generating it —
            # see INSTALLATION.md's "Preparing TLS Certificates" section),
            # NOT the sudo-logserver-admin Service DNS name used to dial it.
            - -logserver-admin-tls-name=logserver.example.com
            # Optional: seed the first admin user on a fresh deploy (only takes
            # effect if the user store is empty). Without it, the Replay UI shows
            # the Bootstrap Setup screen for interactive first-admin creation.
            # See INSTALLATION.md section 6.
            # - -admin-users=<your-username>

          env:
            - name: TZ
              value: Europe/Stockholm
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: s3-secret-key
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-distributed
                  key: db-url
            - name: APPROVAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sudo-logger-approval-token  # pragma: allowlist secret
                  key: token

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          volumeMounts:
            - name: buffer
              mountPath: /var/lib/sudo-logger/buffer
            - name: tmp
              mountPath: /tmp
            - name: ca-cert
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca.crt
            # Same CA, mounted again at a stable, purpose-specific path for
            # -logserver-admin-ca -- kept independent of the system-bundle
            # override above, which serves a different purpose (OIDC).
            - name: ca-cert
              mountPath: /etc/sudo-logger/admin-ca.crt
              subPath: ca.crt
              readOnly: true

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20


      volumes:
        - name: buffer
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: ca-cert
          secret:
            secretName: sudo-logger-tls  # pragma: allowlist secret
            items:
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: sudo-replay-server
  namespace: sudo-logger
spec:
  type: NodePort
  selector:
    app: sudo-replay-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
