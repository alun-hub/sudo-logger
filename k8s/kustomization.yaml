apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# secret.yaml is NOT listed here — it's a template with placeholder values,
# not something to apply directly. Create the real sudo-logger-tls secret
# first with `bash create-secret.sh <pki-dir>` (or a manual `kubectl create
# secret` — see INSTALLATION.md), then run `kubectl apply -k k8s/`.
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - replay-server-local.yaml
