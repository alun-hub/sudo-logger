# tests/docker-compose.yml — System test environment
version: '3.8'

services:
  logserver:
    build:
      context: ../
      dockerfile: tests/Dockerfile.server
    container_name: sudo-logserver-test
    ports:
      - "9876:9876"
    volumes:
      - ./pki:/etc/sudo-logger:ro,Z
      - sudologs-test:/var/log/sudoreplay
    command:
      - "-listen=:9876"
      - "-logdir=/var/log/sudoreplay"
      - "-cert=/etc/sudo-logger/server.crt"
      - "-key=/etc/sudo-logger/server.key"
      - "-ca=/etc/sudo-logger/ca.crt"
      - "-signkey=/etc/sudo-logger/ack-sign.key"

  client:
    build:
      context: ../
      dockerfile: tests/Dockerfile.client
    container_name: sudo-client-test
    depends_on:
      - logserver
    volumes:
      - ./pki:/etc/sudo-logger:ro,Z
    cap_add:
      - SYS_ADMIN
    privileged: true

volumes:
  sudologs-test:
