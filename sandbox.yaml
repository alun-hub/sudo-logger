# /etc/sudo-logger/sandbox.yaml
#
# Comprehensive process sandbox for sudo sessions on Fedora systems.
# Protects security-critical files, devices, proc entries, sockets and daemons
# from being tampered with by processes running inside sudo sessions.
#
# Enforcement is kernel-level via eBPF LSM — cannot be bypassed by root
# within a session. The agent must be running and BPF must be active in the
# kernel LSM list (verify: grep bpf /sys/kernel/security/lsm).
# Fedora 38+: active by default, no boot parameters needed.
# Older/non-Fedora: add lsm=bpf to GRUB_CMDLINE_LINUX, run grub2-mkconfig.
#
# WHAT THIS PROTECTS:
#
#   Files (from the protect.files list):
#     BLOCKS:  write-open, truncate, delete, rename of listed paths.
#     BLOCKS:  creating files, dirs, symlinks, device nodes INSIDE listed dirs.
#     BLOCKS:  bind-mounting over a listed path (mount target inode is protected).
#     ALLOWS:  reading listed paths (no read restriction).
#     ALLOWS:  mounting onto paths NOT in the list (e.g. sudo mount /dev/sdb1 /mnt).
#
#   Network (always enforced, not configurable here yet):
#     BLOCKS:  AF_NETLINK sockets for NETLINK_ROUTE, NETLINK_NETFILTER,
#              NETLINK_FIREWALL and NETLINK_AUDIT — prevents iptables, nft,
#              ip-route changes and auditctl -D from within a session.
#     ALLOWS:  all other socket families and protocols.
#
#   Process integrity (always enforced, not configurable here yet):
#     BLOCKS:  ptrace() targeting processes outside the sandbox — prevents
#              /proc/<pid>/mem injection into root daemons (sshd, agent, etc.).
#
#   Sockets (from the protect.sockets list):
#     BLOCKS:  replacing (write/rename/unlink) listed socket files.
#     ALLOWS:  connect()+send() IPC through listed sockets (content not filtered).
#
#   Processes (from the protect.processes list):
#     BLOCKS:  any signal (including SIGKILL) sent directly from a session process.
#     NOTE:    systemctl stop goes via D-Bus → systemd and is blocked separately
#              by RefuseManualStop=yes in the respective unit drop-in files.
#
#   NOTE: paths are resolved to inodes at agent startup. Restart the agent
#         after adding entries for new paths.
#
# Adapt device paths (sda/nvme) to match your hardware before deploying.

# Global feature flags — all default to true when absent.
# Set to false to disable a specific protection (e.g. in environments where
# network administrators need iproute2 or admins need mount operations).
features:
  deny_netlink: true          # Block AF_NETLINK (iptables, nftables, ip route, auditctl -D)
  deny_mount: true            # Block mounting over protected inodes
  deny_ptrace: true           # Block ptrace of processes outside the sandbox
  deny_cap_audit_control: true  # Block CAP_AUDIT_CONTROL (auditctl, defence in depth)
  deny_cap_net_admin: false   # Block CAP_NET_ADMIN (raw sockets, netdevice ops)
  deny_cap_sys_module: true   # Block CAP_SYS_MODULE (insmod, modprobe)
  deny_systemd_ipc: false     # Block connect() to systemd/D-Bus control sockets
                              # (closes the systemd-run / StartTransientUnit escape).
                              # OFF by default: also blocks systemctl/loginctl/
                              # hostnamectl from within a sandboxed session.

protect:

  # ── Files and directories ────────────────────────────────────────────────────
  files:

    # sudo-logger itself — the audit trail must not be tampered with
    - /etc/sudo-logger
    - /var/log/sudo-logger
    - /usr/bin/sudo-logger-agent          # agent binary — replacement affects future sessions
    - /usr/libexec/sudo/sudo_logger_plugin.so  # plugin — replacement silences future sessions

    # sudo policy
    - /etc/sudoers
    - /etc/sudoers.d
    - /etc/sudo.conf

    # Local user and password databases
    - /etc/passwd
    - /etc/shadow
    - /etc/group
    - /etc/gshadow
    - /etc/login.defs

    # PAM — authentication stack for all system services
    - /etc/pam.d
    - /etc/security

    # SSH server — key material and daemon config
    - /etc/ssh
    - /etc/ssh/sshd_config

    # SSSD — central auth broker for AD/LDAP/Kerberos
    - /etc/sssd
    - /etc/sssd/sssd.conf
    - /var/lib/sss               # SSSD state, keytab cache and pipes
    - /var/lib/sss/db            # SSSD on-disk cache

    # Kerberos — keytab is a root-equivalent credential
    - /etc/krb5.conf
    - /etc/krb5.keytab

    # auditd — audit policy and the audit log itself
    - /etc/audit
    - /var/log/audit

    # System logging — rsyslog and syslog-ng
    - /etc/rsyslog.conf
    - /etc/rsyslog.d
    - /etc/syslog-ng
    - /var/log/secure            # auth/sudo log (Fedora/RHEL)
    - /var/log/messages
    - /var/log/journal           # systemd journal on-disk store

    # SELinux — protecting config (SELINUX=permissive/disabled) is the critical
    # target; the broad /etc/selinux directory is intentionally NOT protected so
    # that semodule/semanage can update file_contexts and the compiled policy.
    # Protecting the whole tree would block legitimate policy updates and cause
    # a circular dependency (sandbox blocks semodule which fixes sandbox denials).
    - /etc/selinux/config

    # System-wide crypto policies (TLS cipher suites, key lengths)
    - /etc/crypto-policies

    # PKI — CA bundles, system certificates, sudo-logger TLS material
    - /etc/pki

    # authselect — controls which auth stack (SSSD/winbind/etc.) is active
    - /etc/authselect

    # PolicyKit — governs privilege escalation outside sudo
    - /etc/polkit-1

    # D-Bus policy — controls inter-process communication rights
    - /etc/dbus-1

    # Cron — classic persistence vector
    - /etc/cron.d
    - /etc/cron.daily
    - /etc/cron.hourly
    - /etc/cron.weekly
    - /etc/cron.monthly
    - /etc/crontab
    - /var/spool/cron

    # at — one-shot scheduled jobs (post-session execution vector)
    - /var/spool/at
    - /etc/at.allow
    - /etc/at.deny

    # systemd units — prevent installing persistent backdoor services
    - /etc/systemd/system
    - /usr/lib/systemd/system

    # Firewall rules persistence — transient iptables/nftables rules survive via these
    - /etc/sysconfig/iptables
    - /etc/sysconfig/ip6tables
    - /etc/nftables.conf
    - /etc/nftables

    # Network name resolution — DNS redirect to rogue log server
    - /etc/hosts
    - /etc/resolv.conf
    - /etc/nsswitch.conf
    - /etc/NetworkManager

    # Dynamic linker — ld.so.preload injects libraries into agent on next restart
    - /etc/ld.so.preload
    - /etc/ld.so.conf
    - /etc/ld.so.conf.d

    # root home — prevent planting shell hooks or SSH backdoors
    - /root/.bashrc
    - /root/.bash_profile
    - /root/.bash_logout
    - /root/.ssh
    - /root/.ssh/authorized_keys

  # ── Forbidden binaries ───────────────────────────────────────────────────────
  # These binaries are completely blocked from execution inside a session.
  # Use this to prevent sandbox escapes via IPC (e.g. firewall-cmd -> firewalld)
  # or to block tools that are too dangerous/noisy for audited sessions.
  forbidden:
    - /usr/bin/firewall-cmd   # Prevent firewall changes via D-Bus escape
    - /usr/bin/bpftool       # Prevent BPF tampering and log spam
    - /usr/sbin/nft          # Direct firewall manipulation
    - /usr/sbin/iptables     # Direct firewall manipulation (legacy)
    - /usr/sbin/ip6tables    # Direct firewall manipulation (legacy)

  # ── Device nodes ─────────────────────────────────────────────────────────────
  devices:
    # Raw memory access — bypass any in-kernel protection
    - /dev/mem
    - /dev/kmem
    - /dev/port                  # raw x86 I/O port access

    # Raw disk — read/write partition tables, bypass filesystem permissions
    # Adapt to your hardware: sda/sdb for SCSI/SATA, nvme0n1 for NVMe
    - /dev/sda
    - /dev/sdb
    - /dev/nvme0n1
    - /dev/nvme0n1p1             # EFI system partition

  # ── /proc entries ────────────────────────────────────────────────────────────
  proc:
    # Immediate system impact
    - /proc/sysrq-trigger        # trigger panic, reboot, kill all, OOM

    # Kernel memory exposure
    - /proc/kcore                # full kernel memory image
    - /proc/kallsyms             # symbol→address map, KASLR bypass aid

    # sysctl — security-relevant kernel parameters
    - /proc/sys/kernel/core_pattern          # redirect core dumps to execute code
    - /proc/sys/kernel/randomize_va_space   # disable ASLR
    - /proc/sys/kernel/dmesg_restrict       # loosen kernel log restrictions
    - /proc/sys/kernel/kptr_restrict        # expose kernel pointers
    - /proc/sys/kernel/perf_event_paranoid  # loosen perf event access
    - /proc/sys/kernel/modules_disabled     # lock out module loading changes
    - /proc/sys/kernel/unprivileged_userns_clone  # user namespace restrictions
    - /proc/sys/fs/suid_dumpable            # enable setuid core dumps
    - /proc/sys/net/ipv4/ip_forward         # turn host into a router
    - /proc/sys/net/ipv4/conf/all/accept_redirects  # ICMP redirect acceptance
    - /proc/sys/net/ipv6/conf/all/forwarding

  # ── Unix domain sockets ──────────────────────────────────────────────────────
  # Note: file_permission/MAY_WRITE prevents open()-for-write and deletion/rename
  # of the socket file. It does NOT block connect()+send() IPC.
  sockets:
    - /run/sudo-logger/plugin.sock       # audit pipeline — must not be replaced
    - /run/systemd/journal/socket        # journald ingestion socket
    - /run/systemd/journal/stdout        # journald stdout forwarder

  # ── Process names ────────────────────────────────────────────────────────────
  # Sessions cannot send ANY signal (including SIGKILL) to these processes.
  # Linux stores comm in task_struct->comm[16], so names are capped at 15 chars.
  # Verify the truncated name with: cat /proc/<pid>/comm
  processes:
    - auditd             # audit daemon
    - rsyslogd           # rsyslog
    - syslog-ng          # syslog-ng
    - systemd-journal    # systemd-journald truncates to 15 chars
    - systemd            # PID 1 — init
    - sssd               # System Security Services Daemon
    - sshd               # OpenSSH server
    - dbus-daemon        # D-Bus
    - polkitd            # PolicyKit
    - chronyd            # time sync — audit timestamps depend on this
    - NetworkManager     # network (14 chars — fits)
    - firewalld          # firewalld
    - gssproxy           # Kerberos GSS proxy
    - crond              # crond
    - sudo-logger-age    # sudo-logger-agent (16 chars → truncated to 15)
