services:
  logserver:
    build: .
    image: sudo-logger:latest
    container_name: sudo-logserver
    ports:
      - "9876:9876"
    command:
      - "-listen=:9876"
      - "-logdir=/var/log/sudoreplay"
      - "-cert=/etc/sudo-logger/server.crt"
      - "-key=/etc/sudo-logger/server.key"
      - "-ca=/etc/sudo-logger/ca.crt"
      - "-signkey=/etc/sudo-logger/ack-sign.key"
      - "-health-listen=:9877"
    volumes:
      - ./pki:/etc/sudo-logger:ro,Z
      - sudologs:/var/log/sudoreplay
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9877/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  replay-server:
    image: sudo-logger:latest
    container_name: sudo-replay-server
    depends_on:
      logserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    entrypoint: ["/usr/local/bin/sudo-replay-server"]
    command:
      - "-logdir=/var/log/sudoreplay"
      - "-listen=:8080"
      - "-rules=/etc/sudo-logger/risk-rules.yaml"
      # Uncomment to enable HTTPS (mount cert/key via the pki volume):
      #- "-tls-cert=/etc/sudo-logger/replay.crt"
      #- "-tls-key=/etc/sudo-logger/replay.key"
      # Uncomment to enable HTTP Basic Auth (htpasswd file with bcrypt hashes):
      #- "-htpasswd=/etc/sudo-logger/replay.htpasswd"
      # Uncomment when deployed behind Pomerium / oauth2-proxy / OpenShift ingress:
      #- "-trusted-user-header=X-Forwarded-User"
    volumes:
      # Session logs — must be read-write so the replay server can write
      # risk.json score-cache files alongside each session directory.
      - sudologs:/var/log/sudoreplay
      # Risk-scoring rules — the default file is bundled in the image.
      # To persist Settings UI changes across container restarts, mount a
      # host directory here instead:
      #   - ./config:/etc/sudo-logger:Z
      # Pre-populate it with the default rules before first start:
      #   mkdir -p config
      #   podman run --rm --entrypoint cat sudo-logger:latest \
      #       /etc/sudo-logger/risk-rules.yaml > config/risk-rules.yaml
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sudologs:
