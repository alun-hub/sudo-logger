version: "2"

run:
  timeout: 10m

linters:
  enable:
    - govet        # go vet — misstänkta konstruktioner
    - ineffassign  # onödiga variabeltilldelningar (snabb)
    - staticcheck  # statisk analys
    - errcheck     # ej hanterade errors
    - gosec        # säkerhetsproblem (långsam, kör i CI)
    - unused       # oanvänd kod (långsam, kör i CI)
