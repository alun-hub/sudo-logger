# Vendored dependencies are excluded globally — they are upstream code
# that we do not lint, scan for secrets, or reformat.
exclude: ^go/vendor/

repos:
  # --- Secrets & credentials ---
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: \.lock$|package-lock\.json$

  # --- Go: vet + golangci-lint ---
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        language: system
        # ebpf-recorder requires generated files from 'make generate' — skip until built
        entry: bash -c 'cd go && export PATH=/usr/lib/golang/bin:$PATH GOROOT=/usr/lib/golang && go vet $(go list ./... | grep -v ebpf-recorder)'
        pass_filenames: false
        files: \.go$

      - id: golangci-lint
        name: golangci-lint (snabba linters)
        language: system
        entry: bash -c 'cd go && PATH=/usr/lib/golang/bin:$PATH GOROOT=/usr/lib/golang golangci-lint run --enable-only=govet,ineffassign,staticcheck ./internal/... ./cmd/server/... ./cmd/replay-server/... ./cmd/shipper/... ./cmd/loadgen/...'
        pass_filenames: false
        files: \.go$

  # --- C plugin: cppcheck + flawfinder ---
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck (C plugin)
        language: system
        entry: cppcheck --enable=warning --suppress=missingIncludeSystem --error-exitcode=1
        files: plugin/.*\.c$
        pass_filenames: true

      - id: flawfinder
        name: flawfinder (C plugin, nivå 3+)
        language: system
        entry: flawfinder --minlevel=3 --error-level=3
        files: plugin/.*\.c$
        pass_filenames: true

  # --- Trivy (beroenden + IaC) ---
  - repo: local
    hooks:
      - id: trivy
        name: Trivy filesystem scan
        language: system
        entry: trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed .
        pass_filenames: false
        files: (go\.mod|go\.sum|Dockerfile|\.yaml|\.yml)$

  # --- Generella hooks (whitespace, syntax, mm) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
